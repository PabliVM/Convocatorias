// ── CALENDARIO ──
function renderCalendario(){
  var season=S.season;var startYear=parseInt(season.split("-")[0]);
  var months=[];for(var m=6;m<12;m++)months.push({y:startYear,mo:m});for(var m=0;m<6;m++)months.push({y:startYear+1,mo:m});
  var callups=getCallups({season:season});var today=new Date();today.setHours(0,0,0,0);
  var dateMap={},matchDays={};
  callups.forEach(function(c){
    var s=new Date(c.startDate+"T00:00:00"),e=new Date(c.endDate+"T00:00:00");
    for(var d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
      var key=d.toISOString().slice(0,10);if(!dateMap[key])dateMap[key]=[];
      var found=false;for(var i=0;i<dateMap[key].length;i++){if(dateMap[key][i].id===c.id){found=true;break;}}
      if(!found)dateMap[key].push(c);
    }
    if(c.matches)c.matches.forEach(function(m){if(!m.date)return;if(!matchDays[m.date])matchDays[m.date]=[];matchDays[m.date].push({rival:m.rival,time:m.time,callup:c});});
  });
  var dows=["L","M","X","J","V","S","D"];
  var monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var h='<div class="vh"><h1 class="vt">Calendario</h1><span class="vs">'+season+'</span></div>'+
    '<div class="cal-legend">'+
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#5B8FF9"></div>Madrileña</div>'+
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#F87171"></div>Española</div>'+
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#34D399"></div>Internacional</div>'+
    '</div><div id="cal-ev-panel" class="cal-ev-list"></div>';

  months.forEach(function(mo){
    var firstDay=new Date(mo.y,mo.mo,1),lastDay=new Date(mo.y,mo.mo+1,0);
    var startDow=(firstDay.getDay()+6)%7;
    h+='<div class="cal-month"><div class="cal-month-title">'+monthNames[mo.mo]+" "+mo.y+"</div><div class=\"cal-grid\">";
    dows.forEach(function(d){h+='<div class="cal-dow">'+d+"</div>";});
    for(var i=0;i<startDow;i++)h+='<div class="cal-day empty"></div>';
    for(var day=1;day<=lastDay.getDate();day++){
      var dateStr=mo.y+"-"+String(mo.mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      var isToday=(new Date(dateStr+"T00:00:00").getTime()===today.getTime());
      var evs=dateMap[dateStr]||[];var isMatch=!!matchDays[dateStr];
      var dots=evs.map(function(c){var k=selKey(c.selectionType);var cls=k==="madrilena"?"cal-dot-mad":k==="espanola"?"cal-dot-esp":"cal-dot-int";return'<div class="cal-dot '+cls+'"></div>';}).join("");
      h+='<div class="cal-day'+(isToday?" today":"")+(evs.length?" has-ev":"")+'" data-date="'+dateStr+'">'+
        '<span class="cal-dn">'+day+"</span>"+(isMatch?'<span class="cal-ball">⚽</span>':"")+(dots?'<div class="cal-dots">'+dots+"</div>":"")+
        "</div>";
    }
    h+="</div></div>";
  });
  $("main").innerHTML=h;
  var panel=$("cal-ev-panel"),lastDate=null;
  $("main").querySelectorAll(".cal-day.has-ev").forEach(function(el){
    el.addEventListener("click",function(){
      var date=el.dataset.date,evs=dateMap[date]||[];
      if(date===lastDate&&panel.classList.contains("show")){panel.classList.remove("show");lastDate=null;return;}
      lastDate=date;
      var dt=new Date(date+"T12:00:00");
      var label=dt.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
      label=label.charAt(0).toUpperCase()+label.slice(1);
      var dayMatches=matchDays[date]||[];
      var matchInfo=dayMatches.length?'<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:var(--text)">'+
        dayMatches.map(function(m){return"⚽ <strong>vs "+esc(m.rival||"?")+"</strong>"+(m.time?" · "+m.time+"h":"");}).join("<br>")+"</div>":"";
      var rows=evs.map(function(c){var flag=getSelFlag(c.selectionType,c.pais);return'<div class="cal-ev-item" data-id="'+c.id+'"><span class="cal-ev-flag">'+flag+'</span><div class="cal-ev-info"><div class="cal-ev-title">'+esc(c.title)+'</div><div class="cal-ev-dates">'+fmtRange(c.startDate,c.endDate)+(c.timeConc?" · ⏰"+c.timeConc+"h":"")+"</div></div></div>";}).join("");
      panel.innerHTML='<div class="cal-ev-list-title">'+label+"</div>"+matchInfo+rows;
      panel.classList.add("show");panel.scrollIntoView({behavior:"smooth",block:"nearest"});
      panel.querySelectorAll(".cal-ev-item").forEach(function(item){item.addEventListener("click",function(){openDetail(item.dataset.id);});});
    });
  });
}

// ── PLANIFICACIÓN ──
function renderPlanificacion(){
  var planView=S.planView||"bloques",season=S.season;
  var startYear=parseInt(season.split("-")[0]);
  var months=[];for(var m=6;m<12;m++)months.push({y:startYear,mo:m});for(var m=0;m<6;m++)months.push({y:startYear+1,mo:m});
  var monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var CATS=[
    {key:"abs",label:"ABS",type:"espanola"},{key:"sub21",label:"U21",type:"espanola"},
    {key:"sub20",label:"U20",type:"espanola"},{key:"sub19",label:"U19",type:"espanola"},
    {key:"sub18",label:"U18",type:"espanola"},{key:"sub17",label:"U17",type:"espanola"},
    {key:"sub16",label:"U16",type:"espanola"},{key:"sub15",label:"U15",type:"espanola"},
    {key:"sub14",label:"U14",type:"espanola"},{key:"sub14",label:"MAD",type:"madrilena"}
  ];
  var rmCallups=getCallups({season:season});
  var allEvs=rmCallups.concat(_refEvents.filter(function(e){return e.startDate>=season.split("-")[0]+"-07-01";}));
  function evColor(type){var k=selKey(type||"espanola");return k==="madrilena"?"#1A3A8F":k==="internacional"?"#047857":"#DC2626";}
  function getLabel(ev){if(ev.pais)return ev.pais;if(ev.rival)return ev.rival;return ev.title||"";}

  var h='<div class="vh"><h1 class="vt">Planificación</h1><span class="vs">'+season+'</span></div>'+
    '<div class="plan-toggle">'+
    '<button class="plan-tbtn'+(planView==="semanal"?" on":"")+'" data-pv="semanal">≡ Semanal</button>'+
    '<button class="plan-tbtn'+(planView==="bloques"?" on":"")+'" data-pv="bloques">◼ Bloques</button>'+
    '</div>';

  if(planView==="semanal"){
    h+='<div class="plan-table-wrap"><table class="plan-table"><thead><tr><th>Semana</th>';
    CATS.forEach(function(c){h+="<th>"+c.label+"</th>";});h+="</tr></thead><tbody>";
    var today=new Date();today.setHours(0,0,0,0);
    months.forEach(function(mo){
      var firstDay=new Date(mo.y,mo.mo,1),lastDay=new Date(mo.y,mo.mo+1,0);
      var d=new Date(firstDay);var dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);
      while(d<=lastDay){
        var wStart=new Date(d),wEnd=new Date(d);wEnd.setDate(wEnd.getDate()+6);
        var isNow=today>=wStart&&today<=wEnd;
        var label=wStart.toLocaleDateString("es-ES",{day:"2-digit",month:"short"});
        h+='<tr class="'+(isNow?"week-today":"")+'"><td>'+label+"</td>";
        CATS.forEach(function(cat){
          var cells="";
          allEvs.forEach(function(ev){
            if((ev.selectionCategory||ev.cat)!==cat.key)return;
            var evType=selKey(ev.selectionType||ev.type||"espanola"),catType=selKey(cat.type);
            if(evType!==catType)return;
            var evS=new Date(ev.startDate+"T00:00:00"),evE=new Date(ev.endDate+"T00:00:00");
            if(evS<=wEnd&&evE>=wStart){
              var col=evColor(ev.selectionType||ev.type);var hasRM=ev.players&&ev.players.length>0;
              var lbl=getLabel(ev).slice(0,12);
              cells+='<div class="plan-cell" style="background:'+col+(hasRM?";outline:1px solid var(--gold)":"")+ '" data-id="'+ev.id+'">'+( hasRM?"★ ":"")+esc(lbl)+"</div>";
            }
          });
          h+="<td>"+cells+"</td>";
        });
        h+="</tr>";d.setDate(d.getDate()+7);
      }
    });
    h+="</tbody></table></div>"+'<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">★ = jugadores RM convocados · borde dorado</div>';
  } else {
    months.forEach(function(mo){
      var moStr=String(mo.mo+1).padStart(2,"0");var moStart=mo.y+"-"+moStr+"-01";
      var lastDay=new Date(mo.y,mo.mo+1,0);var daysInMonth=lastDay.getDate();
      var moEnd=mo.y+"-"+moStr+"-"+String(daysInMonth).padStart(2,"0");
      var hasEvs=allEvs.some(function(ev){return ev.startDate<=moEnd&&ev.endDate>=moStart;});
      if(!hasEvs)return;
      h+='<div class="plan-month"><div class="plan-month-title">'+monthNames[mo.mo]+" "+mo.y+'</div><div class="plan-blocks">';
      CATS.forEach(function(cat){
        var catEvs=allEvs.filter(function(ev){
          if((ev.selectionCategory||ev.cat)!==cat.key)return false;
          var evType=selKey(ev.selectionType||ev.type||"espanola"),catType=selKey(cat.type);
          if(evType!==catType)return false;
          return ev.startDate<=moEnd&&ev.endDate>=moStart;
        });
        if(!catEvs.length)return;
        h+='<div class="plan-block-row"><div class="plan-block-cat">'+cat.label+'</div><div class="plan-block-track">';
        catEvs.forEach(function(ev){
          var evS=new Date(ev.startDate+"T00:00:00"),evE=new Date(ev.endDate+"T00:00:00");
          var moS=new Date(mo.y,mo.mo,1),moE=new Date(mo.y,mo.mo+1,0);
          var clampS=evS<moS?moS:evS,clampE=evE>moE?moE:evE;
          var left=((clampS.getDate()-1)/daysInMonth*100).toFixed(1);
          var right=((moE.getDate()-clampE.getDate())/daysInMonth*100).toFixed(1);
          var width=(100-parseFloat(left)-parseFloat(right)).toFixed(1);
          var col=evColor(ev.selectionType||ev.type);var hasRM=ev.players&&ev.players.length>0;
          h+='<div class="plan-block-ev" style="left:'+left+'%;width:'+width+'%;background:'+col+(hasRM?";outline:1.5px solid var(--gold)":"")+'" data-id="'+ev.id+'" title="'+esc(ev.title)+'">'+( hasRM?"★ ":"")+esc(getLabel(ev))+"</div>";
        });
        h+="</div></div>";
      });
      h+="</div></div>";
    });
  }

  $("main").innerHTML=h;
  $("main").querySelectorAll("[data-pv]").forEach(function(b){b.addEventListener("click",function(){S.planView=b.dataset.pv;renderPlanificacion();});});
  $("main").querySelectorAll("[data-id]").forEach(function(el){
    el.addEventListener("click",function(e){
      e.stopPropagation();var id=el.dataset.id;
      var rmEv=getCallups({}).filter(function(c){return c.id===id;})[0];
      if(!rmEv){var ref=_refEvents.filter(function(r){return r.id===id;})[0];if(ref)toast(esc(ref.title)+(ref.startDate?" · "+fmtRange(ref.startDate,ref.endDate):""));}
      else openDetail(id);
    });
  });
}

// ── DETAIL ──
function bindCards(){document.querySelectorAll(".cc").forEach(function(c){c.addEventListener("click",function(){openDetail(c.dataset.id);});c.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" ")openDetail(c.dataset.id);});});}

function openDetail(id){
  var all=getCallups();var c=null;for(var i=0;i<all.length;i++){if(all[i].id===id){c=all[i];break;}}if(!c)return;
  var ov=document.createElement("div");ov.className="mo";
  ov.innerHTML='<div class="modal" role="dialog"><button class="mcl">✕</button>'+callupDetail(c)+"</div>";
  document.body.appendChild(ov);document.body.style.overflow="hidden";
  var close=function(){ov.remove();document.body.style.overflow="";};
  ov.querySelector(".mcl").addEventListener("click",close);
  ov.addEventListener("click",function(e){if(e.target===ov)close();});
  var delBtn=ov.querySelector("[data-del='"+id+"']");
  if(delBtn)delBtn.addEventListener("click",function(){if(!confirm("¿Eliminar \""+c.title+"\"?"))return;deleteCallup(id);close();toast("🗑 Eliminada");route(S.view);});
  var editBtn=ov.querySelector("[data-edit='"+id+"']");
  if(editBtn)editBtn.addEventListener("click",function(){close();S.editingId=id;route("nueva");});
}

// ── TOAST ──
function toast(msg,type){
  var t=document.createElement("div");t.className="toast"+(type?" toast-"+type:"");t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.classList.add("on");},10);
  setTimeout(function(){t.classList.remove("on");setTimeout(function(){t.remove();},300);},3200);
}

renderSeasonSel();
// ── AI PARSER ──
function bindAiParser(){
  var btn=document.getElementById("btn-ai-parser");
  if(!btn)return;
  btn.addEventListener("click",function(){
    // Build modal
    var modal=document.createElement("div");modal.className="mo";
    modal.innerHTML=
      '<div class="modal modal-tall" style="padding-bottom:40px">'+
      '<button class="mcl" id="aip-close">×</button>'+
      '<div class="mtitle">✨ Nota de prensa</div>'+
      '<p class="msub">Pega el texto de la convocatoria RFEF o cualquier nota oficial. Claude extraerá los datos automáticamente.</p>'+
      '<div class="ai-modal-body">'+
      '<textarea class="ai-textarea" id="aip-text" placeholder="Pega aquí el texto de la convocatoria..."></textarea>'+
      '<div class="ai-status" id="aip-status"></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-top:12px">'+
      '<button class="btn btn-ghost" id="aip-cancel" style="flex:1">Cancelar</button>'+
      '<button class="btn btn-gold" id="aip-ok" style="flex:1">✨ Extraer datos</button>'+
      '</div></div>';
    document.body.appendChild(modal);

    function closeModal(){if(modal.parentNode)modal.parentNode.removeChild(modal);}
    document.getElementById("aip-close").addEventListener("click",closeModal);
    document.getElementById("aip-cancel").addEventListener("click",closeModal);
    modal.addEventListener("click",function(e){if(e.target===modal)closeModal();});

    document.getElementById("aip-ok").addEventListener("click",function(){
      var text=(document.getElementById("aip-text").value||"").trim();
      if(!text){document.getElementById("aip-status").textContent="Pega un texto primero.";return;}
      var status=document.getElementById("aip-status");
      var okBtn=document.getElementById("aip-ok");
      status.className="ai-status";status.textContent="⏳ Analizando...";
      okBtn.disabled=true;okBtn.textContent="Analizando...";

      var today=new Date().toISOString().slice(0,10);
      var prompt=[
        "Eres un experto en convocatorias del Real Madrid Cantera. Analiza el texto y devuelve SOLO JSON valido, sin markdown.",
        "Hoy es "+today+". Fechas en formato YYYY-MM-DD. Si un dato no aparece usa null o [].",
        "",
        "EL TEXTO ES UN EXTRACTO DEL EXCEL OFICIAL DE CONVOCATORIAS DE REAL MADRID. Formato de columnas:",
        "- Col 1: JUGADOR Y FECHA DE PRESENTACION. Formato: APELLIDO, NOMBRE + fecha presentacion + hora + lugar.",
        "- Col 2: D/P/E = Definitiva / Provisional / Entrenamientos (estado de la convocatoria).",
        "- Col 3: ALOJAMIENTO Y TELEFONO del hotel.",
        "- Col 4: VUELO IDA (numero vuelo, origen-destino, salida, llegada).",
        "- Col 5: VUELO REGRESO (numero vuelo, origen-destino, salida, llegada).",
        "- Col 6: FECHA Y LUGAR CELEBRACION de los partidos.",
        "- Col 7: OFICIAL o AMISTOSO.",
        "- Col 8: OPONENTE.",
        "- Col 9: OBSERVACIONES (nombre de la seleccion, pais, etc).",
        "",
        "REGLAS DE INTERPRETACION:",
        "- La seleccion (espanola/madrilena/internacional) y categoria (sub16, sub17...) se deduce de OBSERVACIONES.",
        "- Si dice 'Seleccion espanola Sub 17' -> selectionType=espanola, selectionCategory=sub17.",
        "- Si dice 'Seleccion francesa/marroqui/colombiana...' -> selectionType=internacional, pais=Francia/Marruecos/Colombia...",
        "- Si dice 'Seleccion madrilena' -> selectionType=madrilena.",
        "- startDate y endDate se extraen del rango de FECHA Y LUGAR CELEBRACION.",
        "- conc.date y conc.time vienen de la fecha/hora de presentacion del jugador (col 1).",
        "- conc.lugar es el punto de encuentro de presentacion (ej: Terminal 4, Aeropuerto de Barajas).",
        "- conc.transporte es el vuelo de ida (col 4): numero vuelo + horarios.",
        "- vuelta.transporte es el vuelo de regreso (col 5): numero vuelo + horarios.",
        "- vuelta.date y vuelta.time se extraen del vuelo de regreso.",
        "- location es el lugar de concentracion/celebracion.",
        "- matches: cada fila con fecha+lugar+oponente es un partido.",
        "- rival: los oponentes separados por coma si son varios.",
        "- notes: incluye estado D/P/E, alojamiento, y cualquier info relevante.",
        "- title: genera titulo descriptivo. Ej: 'Espana Sub-17 vs Irlanda del Norte' o 'Francia Sub-17 - UEFA Ronda Elite'.",
        "",
        "JSON a devolver:",
        "{\"selectionType\":\"madrilena|espanola|internacional\",",
        "\"selectionCategory\":\"sub12|sub13|sub14|sub15|sub16|sub17|sub18|sub19|sub20|sub21|abs\",",
        "\"pais\":\"pais si internacional sino null\",",
        "\"title\":\"titulo descriptivo\",",
        "\"startDate\":\"YYYY-MM-DD\",\"endDate\":\"YYYY-MM-DD\",",
        "\"rival\":\"rival o rivales\",\"location\":\"lugar de concentracion\",",
        "\"conc\":{\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM\",\"lugar\":\"punto presentacion\",\"transporte\":\"vuelo ida con numero y horario\"},",
        "\"vuelta\":{\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM\",\"lugar\":\"aeropuerto llegada\",\"transporte\":\"vuelo regreso con numero y horario\"},",
        "\"matches\":[{\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM\",\"rival\":\"rival\"}],",
        "\"notes\":\"estado D/P/E + alojamiento + obs adicionales\"}",
        "",
        "TEXTO A PARSEAR:",text
      ].join("\n");

      fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          messages:[{role:"user",content:prompt}]
        })
      })
      .then(function(r){return r.json();})
      .then(function(data){
        var raw=(data.content&&data.content[0]&&data.content[0].text)||"";
        // Strip markdown fences if present
        raw=raw.replace(/```json|```/g,"").trim();
        var parsed;
        try{parsed=JSON.parse(raw);}catch(e){throw new Error("JSON inválido: "+raw.slice(0,100));}

        // Fill form fields
        var form=document.getElementById("cf");
        if(!form)throw new Error("Formulario no encontrado");

        // selectionType radio
        if(parsed.selectionType){
          var rb=form.querySelector('[name="selType"][value="'+parsed.selectionType+'"]');
          if(rb){rb.checked=true;rb.dispatchEvent(new Event("change"));}
        }

        setTimeout(function(){
          // Category
          if(parsed.selectionCategory){
            var cat=document.getElementById("sel-cat");
            if(cat)cat.value=parsed.selectionCategory;
          }
          // País
          if(parsed.pais){
            var pf=document.getElementById("f-pais");if(pf)pf.value=parsed.pais;
            var pg=document.getElementById("pais-g");if(pg)pg.style.display="block";
          }
          // Text fields
          var fields={title:parsed.title,startDate:parsed.startDate,endDate:parsed.endDate,
            rival:parsed.rival,location:parsed.location,notes:parsed.notes};
          Object.keys(fields).forEach(function(k){
            if(!fields[k])return;
            var el=form.querySelector('[name="'+k+'"]');if(el)el.value=fields[k];
          });
          // Conc
          if(parsed.conc){
            var cf2={"concDate":parsed.conc.date,"concTime":parsed.conc.time,"concLugar":parsed.conc.lugar,"concTransporte":parsed.conc.transporte};
            Object.keys(cf2).forEach(function(k){if(!cf2[k])return;var el=form.querySelector('[name="'+k+'"]');if(el)el.value=cf2[k];});
          }
          // Vuelta
          if(parsed.vuelta){
            var vf={"vueltaDate":parsed.vuelta.date,"vueltaTime":parsed.vuelta.time,"vueltaLugar":parsed.vuelta.lugar,"vueltaTransporte":parsed.vuelta.transporte};
            Object.keys(vf).forEach(function(k){if(!vf[k])return;var el=form.querySelector('[name="'+k+'"]');if(el)el.value=vf[k];});
          }
          // Matches
          if(parsed.matches&&parsed.matches.length){
            var ml=document.getElementById("matches-list");
            if(ml){
              ml.innerHTML="";
              parsed.matches.forEach(function(m,i){
                var row=document.createElement("div");row.className="match-row";
                row.innerHTML='<input class="fi" type="date" name="mdate_'+i+'" value="'+(m.date||"")+'" style="flex:1.2"/>'+
                  '<input class="fi" type="time" name="mtime_'+i+'" value="'+(m.time||"")+'" style="flex:.8"/>'+
                  '<input class="fi" type="text" name="mrival_'+i+'" value="'+((m.rival||"").replace(/"/g,"&quot;"))+'" placeholder="Rival" style="flex:1.5"/>'+
                  '<button type="button" class="btn-rm">×</button>';
                row.querySelector(".btn-rm").addEventListener("click",function(){row.remove();});
                ml.appendChild(row);
              });
            }
          }
          status.className="ai-status ok";
          status.textContent="✓ Datos extraídos. Revisa y completa lo que falte.";
          okBtn.textContent="Hecho";
          setTimeout(function(){closeModal();},1200);
        },80);
      })
      .catch(function(err){
        status.className="ai-status err";
        status.textContent="⚠ Error: "+err.message;
        okBtn.disabled=false;okBtn.textContent="✨ Extraer datos";
      });
    });
  });
}

route("agenda");
